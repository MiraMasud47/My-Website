<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Royal Spice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="checkout-page">
  <h1>Checkout</h1>

  <div id="checkoutItems"></div>

  <h2>Total: ₹<span id="checkoutTotal">0</span></h2>

  <form onsubmit="saveCheckout(event)" class="checkout-form">
    <input type="text" id="customerName" placeholder="Full Name" required>
    <input type="text" id="customerPhone" placeholder="Mobile Number" required>
    <textarea id="customerAddress" placeholder="Full Address" required></textarea>

    <button class="checkout-btn" type="submit">
      Continue to Payment
    </button>
  </form>
</section>

<script>
  const checkoutItems = document.getElementById("checkoutItems");
  const checkoutTotal = document.getElementById("checkoutTotal");

  let cart = JSON.parse(localStorage.getItem("eliteCart")) || [];

  function showCheckout(){
    checkoutItems.innerHTML = "";

    let total = 0;

    if(cart.length === 0){
      checkoutItems.innerHTML = `<p>Your cart is empty</p>`;
      checkoutTotal.innerText = 0;
      return;
    }

    cart.forEach(item => {
      let qty = item.qty || 1;
      let subtotal = Number(item.price) * qty;

      total += subtotal;

      checkoutItems.innerHTML += `
        <div class="cart-item">
          <h3>${item.name}</h3>
          <p>Price: ₹${item.price}</p>
          <p>Qty: ${qty}</p>
          <p>Subtotal: ₹${subtotal}</p>
        </div>
      `;
    });

    checkoutTotal.innerText = total;
    localStorage.setItem("eliteTotal", total);
  }

  function saveCheckout(event){
    event.preventDefault();

    const customer = {
      name: document.getElementById("customerName").value,
      phone: document.getElementById("customerPhone").value,
      address: document.getElementById("customerAddress").value
    };

    localStorage.setItem("eliteCustomer", JSON.stringify(customer));
    window.location.href = "payment.html";
  }

  showCheckout();
</script>

</body>
</html>
