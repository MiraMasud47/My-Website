<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | Royal Spice</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        header {
            background: #111;
            color: white;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .wishlist-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }

        .wishlist-title {
            font-size: 35px;
            margin-bottom: 30px;
            color: #ff9800;
            margin-bottom: 60px;
            margin-top: 40px;
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .wishlist-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            transition: .3s;
        }

        .wishlist-card:hover {
            transform: translateY(-6px);
        }

        .wishlist-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .wishlist-info {
            padding: 20px;
        }

        .wishlist-info h3 {
            margin: 0;
            margin-bottom: 10px;
        }

        .wishlist-info p {
            color: #666;
        }

        .price {
            font-size: 24px;
            color: #ff9800;
            font-weight: bold;
            margin: 15px 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .cart-btn {

            flex: 1;
            border: none;
            padding: 12px;
            background: #ff9800;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .remove-btn {

            flex: 1;
            border: none;
            padding: 12px;
            background: #e53935;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        #wishlistGrid {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        .empty {
            text-align: center;
            color: #111;
        }

        .empty h2 {
            font-size: 35px;
            margin-bottom: 20px;
        }

        .empty-cart {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #666;
            margin-top: 50px;
        }

        .empty a {

            display: inline-block;
            margin-top: 25px;
            background: #ff9800;
            color: white;
            padding: 14px 30px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>

</head>

<body>

    <header>

        <h2>❤️ My Wishlist</h2>

        <nav>

            <a href="index.html">Home</a>

            <a href="checkout.html">Checkout</a>

        </nav>

    </header>


    <div class="wishlist-container">

        <h1 class="wishlist-title">
            ❤️ Favourite Dishes
        </h1>

        <div class="wishlist-grid" id="wishlistGrid">

        </div>

    </div>


    <script>

        let wishlist =
            JSON.parse(localStorage.getItem("eliteWishlist")) || [];

        let cart =
            JSON.parse(localStorage.getItem("eliteCart")) || [];

        const grid =
            document.getElementById("wishlistGrid");


        function showWishlist() {

            if (wishlist.length === 0) {

                grid.innerHTML = `

        <div class="empty">

        <h2>❤️ Your Wishlist is Empty</h2>

        <p>Add your favourite dishes.</p>

        <a href="index.html">

        Continue Shopping

        </a>

        </div>

        `;

                return;

            }

            grid.innerHTML = "";

            wishlist.forEach(food => {

                grid.innerHTML += `

        <div class="wishlist-card">

            <img src="${food.image}">

            <div class="wishlist-info">

                <h3>${food.name}</h3>

                <p>${food.desc}</p>

                <div class="price">

                ₹${food.price}

                </div>

                <div class="btn-group">

                    <button class="cart-btn"
                    onclick="addCart(${food.id})">

                    🛒 Add

                    </button>

                    <button class="remove-btn"
                    onclick="removeWishlist(${food.id})">

                    Remove

                    </button>

                </div>

            </div>

        </div>

        `;

            });

        }


        function removeWishlist(id) {

            wishlist =
                wishlist.filter(item => item.id !== id);

            localStorage.setItem(
                "eliteWishlist",
                JSON.stringify(wishlist)
            );

            showWishlist();

        }


        function addCart(id) {

            const product =
                wishlist.find(item => item.id === id);

            const exist =
                cart.find(item => item.id === id);

            if (exist) {

                exist.qty++;

            }

            else {

                cart.push({

                    id: product.id,

                    name: product.name,

                    price: product.price,

                    image: product.image,

                    qty: 1

                });

            }

            localStorage.setItem(
                "eliteCart",
                JSON.stringify(cart)
            );

            alert("Added to Cart");

        }

        showWishlist();

    </script>

</body>

</html>
