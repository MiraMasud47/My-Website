<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Orders - Royal Spice</title>
  <link rel="stylesheet" href="style.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #2b1a08, #060606 60%);
      color: white;
      min-height: 100vh;
    }

    .orders-header {
      padding: 20px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.55);
      border-bottom: 1px solid rgba(245,182,66,0.35);
      
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-area img {
      width: 65px;
      height: 65px;
      object-fit: contain;
    }

    .logo-area h1 {
      color: #f5b642;
      font-size: 32px;
      font-weight: bold;
      margin: 0;
    }

    .home-btn {
      text-decoration: none;
      background: linear-gradient(135deg, #f5b642, #ff8c00);
      color: #111;
      padding: 12px 22px;
      border-radius: 12px;
      font-weight: bold;
    }

    .orders-page {
      width: 90%;
      max-width: 1200px;
      margin: 100px auto 40px;
    }

    .page-title {
      font-size: 38px;
      color: #f5b642;
      margin-bottom: 8px;
    }

    .page-subtitle {
      color: #ccc;
      margin-bottom: 35px;
    }

    .order-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .order-top h2 {
      color: #f5b642;
      font-size: 24px;
    }

    .status-badge {
      background: rgba(0,255,153,0.18);
      color: #00ff99;
      padding: 9px 18px;
      border-radius: 50px;
      font-weight: bold;
      border: 1px solid rgba(0,255,153,0.3);
    }

    .order-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 25px;
    }

    .info-box {
      background: rgba(0,0,0,0.35);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .info-box span {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .info-box strong {
      color: #fff;
      font-size: 17px;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      background: rgba(0,0,0,0.3);
      border-radius: 18px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .item-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .item img {
      width: 85px;
      height: 85px;
      border-radius: 14px;
      object-fit: cover;
      background: white;
      flex-shrink: 0;
    }

    .item h3 {
      font-size: 19px;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .item p {
      color: #ccc;
      font-size: 15px;
    }

    .price {
      color: #f5b642;
      font-size: 22px;
      font-weight: bold;
      white-space: nowrap;
    }

    .empty {
      text-align: center;
      padding: 90px 20px;
      background: rgba(255,255,255,0.06);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .empty h2 {
      font-size: 34px;
      color: #f5b642;
      margin-bottom: 12px;
    }

    .empty p {
      color: #bbb;
      margin-bottom: 25px;
    }

    .shop-btn {
      text-decoration: none;
      display: inline-block;
      background: linear-gradient(135deg, #f5b642, #ff8c00);
      color: #111;
      padding: 14px 26px;
      border-radius: 14px;
      font-weight: bold;
    }

    @media(max-width: 650px) {
      .orders-header {
        flex-direction: column;
        gap: 16px;
      }

      .logo-area h1 {
        font-size: 28px;
      }

      .orders-page {
        margin: 45px auto 30px;
      }

      .page-title {
        font-size: 31px;
      }

      .item {
        align-items: flex-start;
        flex-direction: column;
      }

      .price {
        margin-left: 101px;
      }
    }
  </style>
</head>

<body>

<header class="orders-header">
  <div class="logo-area">
    <img src="Website-images/Royal-Spice.png" alt="Royal Spice Logo">
    <h1>Royal Spice</h1>
  </div>

  <a href="index.html" class="home-btn">Continue Shopping</a>
</header>

<section class="orders-page">
  <h1 class="page-title">📦 My Orders</h1>
  <p class="page-subtitle">View your old orders, payment details, and order status.</p>

  <div id="ordersContainer">
    <div class="empty">
      <h2>Loading Orders...</h2>
      <p>Please wait...</p>
    </div>
  </div>
</section>

<script>
  const user = JSON.parse(localStorage.getItem("eliteUser"));

  if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
  }

  fetch(`/my-orders?user_id=${user.id}`)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("ordersContainer");

      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <h2>No Orders Yet</h2>
            <p>You haven't placed any orders.</p>
            <a href="index.html" class="shop-btn">Order Delicious Food</a>
          </div>
        `;
        return;
      }

      let html = "";

      data.forEach(order => {
        html += `
          <div class="order-card">
            <div class="order-top">
              <h2>Order #${order.order_id}</h2>
              <div class="status-badge">${order.status}</div>
            </div>

            <div class="order-info">
              <div class="info-box">
                <span>Total Amount</span>
                <strong>₹${order.total}</strong>
              </div>

              <div class="info-box">
                <span>Payment Method</span>
                <strong>${order.payment}</strong>
              </div>

              <div class="info-box">
                <span>Order Date</span>
                <strong>${order.date}</strong>
              </div>
            </div>

            <div class="items">
        `;

        order.items.forEach(item => {
          html += `
            <div class="item">
              <div class="item-left">
                <img src="${item[1]}" alt="${item[0]}">

                <div>
                  <h3>${item[0]}</h3>
                  <p>Quantity: ${item[2]}</p>
                </div>
              </div>

              <div class="price">₹${item[3]}</div>
            </div>
          `;
        });

        html += `
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    })
    .catch(() => {
      document.getElementById("ordersContainer").innerHTML = `
        <div class="empty">
          <h2>Orders Not Found</h2>
          <p>Please check your backend route /my-orders.</p>
          <a href="index.html" class="shop-btn">Go Back</a>
        </div>
      `;
    });
</script>

</body>
</html>
