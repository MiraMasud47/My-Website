<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Order Success - Royal Spice</title>
  <link rel="stylesheet" href="style.css">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #2b1a08, #050505 60%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
    }

    .success-page {
      width: 100%;
      max-width: 620px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      padding: 45px 30px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(14px);
    }

    .success-icon {
      width: 95px;
      height: 95px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5b642, #ff8c00);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: bold;
      box-shadow: 0 0 35px rgba(245, 182, 66, 0.45);
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      0% {
        transform: scale(0.4);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .success-page h1 {
      font-size: 40px;
      color: #f5b642;
      margin: 10px 0;
    }

    .success-page .subtitle {
      color: #ddd;
      font-size: 17px;
      margin-bottom: 28px;
    }

    .success-box {
      text-align: left;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 22px;
      margin: 25px 0;
    }

    .success-box h3,
    .success-box p {
      margin: 12px 0;
      color: #eee;
      font-size: 16px;
    }

    .success-box span {
      color: #f5b642;
      font-weight: bold;
    }

    .success-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 25px;
    }

    .btn {
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 14px;
      font-weight: bold;
      transition: 0.3s;
      display: inline-block;
    }

    .gold {
      background: linear-gradient(135deg, #f5b642, #ff8c00);
      color: #111;
      box-shadow: 0 10px 25px rgba(245, 182, 66, 0.35);
    }

    .dark {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    @media(max-width: 600px) {
      .success-page {
        padding: 35px 20px;
      }

      .success-page h1 {
        font-size: 32px;
      }

      .success-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <section class="success-page">

    <div class="success-icon">✓</div>

    <h1>Order Confirmed!</h1>

    <p class="subtitle">
      Thank you for ordering from Royal Spice. Your delicious food is on the way.
    </p>

    <div class="success-box">
      <h3 id="successName"></h3>
      <p id="successPayment"></p>
      <p id="successTotal"></p>
      <p>
        <span>Status:</span> Confirmed
      </p>
    </div>

    <div class="success-actions">
      <a href="index.html" class="btn gold">Continue Shopping</a>
      <a href="/my_orders" class="btn dark">
        View My Orders
      </a>
    </div>

  </section>

  <script src="script.js"></script>

</body>

</html>
